    claim: >
      A 25% passive long floor is useful only when activated conditionally from
      train-tail evidence; the 3-month passive-edge trigger improved net,
      funding-aware net, cost5x net, turnover, and max drawdown versus the
      train-selected EMA control.
    evidence:
      - runs/btc_benchmark-20260611T112311Z/reports/cycle6_conditional_long_floor_summary.md
      - runs/btc_benchmark-20260611T112311Z/results/cycle6_conditional_long_floor_summary.json
    confidence: medium
    metric_impact: >
      Versus EMA control: net +0.3546, funding-aware +0.2619, cost5x +0.3677,
      max drawdown +0.0235, turnover -6.5.
    next_action: >
      Use train-only conditional activation as the default floor pattern; avoid
      unconditional passive floors unless a separate drawdown control is added.
