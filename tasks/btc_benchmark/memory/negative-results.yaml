    source_observation_id: cycle5-static-long-floor
    claim: >
      Static passive long floors reduce turnover and can help stressed-cost net,
      but they are not sufficient because they materially worsen drawdown and
      funding-aware robustness.
    evidence:
      - runs/btc_benchmark-20260611T112311Z/reports/cycle5_soft_long_floor_summary.md
      - runs/btc_benchmark-20260611T112311Z/results/cycle5_soft_long_floor_summary.json
    confidence: medium
    metric_impact: >
      The 25% static floor had net +0.0432 and cost5x +0.1422 versus control,
      but funding-aware net -0.0067 and max drawdown -0.0699; higher floors
      worsened drawdown further.
    next_action: >
      Prefer conditional floors that avoid early adverse folds; do not promote
      unconditional floor variants on public-dev score alone.
