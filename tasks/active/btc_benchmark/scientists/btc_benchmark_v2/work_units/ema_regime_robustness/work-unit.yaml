evaluation_plan: Screen nearby EMA parameters, gate the best robust alternatives, and compare against `BestEmaRegimeV1`, buy-hold, and the top Donchian tail candidate.
outcome: Focused EMA sweep screened 1,296 variants and gated the top 8. The best verified candidate was `ema_regime_f12_s1440_b0.025_h72_long_cash` with net +324.3%, Sharpe 1.453, max drawdown -25.1%, 5x-cost net +238.9%, funding-aware net +252.8%, all 14 folds passing default gates, and exhaustive future-perturbation passing with at least 2,160 cutoffs per fold.
decision: Promote `agentic.strategies.rule_strategies:BestEmaRegimeV2` as the current submission candidate.
