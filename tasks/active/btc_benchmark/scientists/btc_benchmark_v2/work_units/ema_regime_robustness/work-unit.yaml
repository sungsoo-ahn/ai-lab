statement: Test whether the current best EMA-regime candidate is robust to nearby parameter choices and time-slice attribution.
method: Run a focused neighborhood around fast=24, slow=1440, band=0.02, min_hold=72; inspect per-year, drawdown, cost stress, funding-aware net, and gate behavior for top variants.
expected_signal: The best candidate should sit in a stable high-performing region rather than an isolated spike; if not, treat it as overfit and propose a more conservative variant.
