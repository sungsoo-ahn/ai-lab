scheme_id: autoscientist
title: AutoScientist
status: active
created_at: 2026-06-10
updated_at: 2026-06-10
category: parallel_research_team
description: A shared-state, parallel team scheme for long-running computational experimentation with hypothesis critique, evidence sharing, and preservation of failed directions.
autonomy_model:
  default_authority: propose_and_run_scoped_local_work_units
  requires_approval:
    - external submissions
    - connector writes
    - account configuration changes
    - Docker, Node, or unlisted OS package installs
work_unit_pattern:
  - literature or source review
  - independent method proposal
  - critique
  - proxy experiment
  - replication
  - synthesis
evidence_discipline:
  - Preserve independent attempts and critiques.
  - Keep shared state explicit so parallel work units can compare methods.
references:
  - https://arxiv.org/abs/2605.28655
  - https://github.com/mims-harvard/AutoScientists/blob/main/runbook.md
public_brief: docs/schemes/autoscientist.md
