scheme_id: autoresearch
title: AutoResearch
status: active
created_at: 2026-06-10
updated_at: 2026-06-10
category: metric_driven_experiment_loop
description: A metric-driven autonomous experiment loop that repeatedly proposes, runs, evaluates, and records bounded experiments against a fixed task-specific target metric.
autonomy_model:
  default_authority: run_declared_local_commands
  requires_approval:
    - external submissions
    - connector writes
    - account configuration changes
    - Docker, Node, or unlisted OS package installs
work_unit_pattern:
  - baseline reproduction
  - candidate generation
  - ablation
  - robustness audit
  - synthesis
evidence_discipline:
  - Preserve failed trials and negative findings.
  - Keep exact commands, source refs, artifacts, and prompts in the evaluation cell.
references:
  - https://github.com/karpathy/autoresearch
public_brief: docs/schemes/autoresearch.md
