hypotheses:
  - hypothesis_id: btc_trend_following_baseline_ladder_v1
    task_id: btc_benchmark
    status: seed
    claim: A small ladder of causal trend-following rules can produce a stronger development referee report than the EMA 12/48 preflight baseline after costs.
    rationale: BTC hourly returns may contain medium-horizon momentum; the existing EMA baseline is a readiness check, not a tuned baseline ladder.
    required_skill_bundle: btc_benchmark_core_skills_v1
    required_taste: btc_robust_alpha_taste_v1
    suggested_tests:
      - Compare EMA, Donchian, and volatility-filtered trend rules through run_benchmark.
      - Audit turnover, cost multipliers, next-open result, random percentile, and per-year concentration.
    decision: pending
  - hypothesis_id: btc_cost_robustness_filter_v1
    task_id: btc_benchmark
    status: seed
    claim: Candidate strategies that reduce turnover using volatility or confidence filters will preserve more net return under 2x-5x cost multipliers.
    rationale: Many hourly BTC rules can look acceptable before transaction costs but fail under turnover pressure.
    required_skill_bundle: btc_benchmark_core_skills_v1
    required_taste: btc_robust_alpha_taste_v1
    suggested_tests:
      - Sweep simple turnover filters around a causal baseline rule.
      - Compare net_cost2x, net_cost3x, net_cost5x, turnover, and random percentile.
    decision: pending
  - hypothesis_id: btc_funding_auxiliary_signal_v1
    task_id: btc_benchmark
    status: seed
    claim: Funding-rate context can improve referee development performance only if it remains causal and robust to funding-aware scoring.
    rationale: Funding is available as auxiliary event data, but its edge can be weak, regime-specific, or already reflected in price.
    required_skill_bundle: btc_benchmark_core_skills_v1
    required_taste: btc_robust_alpha_taste_v1
    suggested_tests:
      - Build causal funding features with event-time alignment.
      - Compare against price-only baselines and inspect funding-aware net result.
    decision: pending
