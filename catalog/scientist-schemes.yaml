schemes:
  - scheme_id: autoresearch
    title: AutoResearch
    description: A metric-driven autonomous experiment loop that repeatedly proposes, runs, evaluates, and records bounded experiments against a fixed target metric.
    references:
      - https://github.com/karpathy/autoresearch
    status: active
    local_manifest: schemes/autoresearch/scheme.yaml
  - scheme_id: autoscientist
    title: AutoScientist
    description: A shared-state, parallel team scheme for long-running computational experimentation with hypothesis critique, evidence sharing, and preservation of failed directions.
    references:
      - https://arxiv.org/abs/2605.28655
      - https://github.com/mims-harvard/AutoScientists/blob/main/runbook.md
    status: active
    local_manifest: schemes/autoscientist/scheme.yaml
