site_name: AI Lab Manual
site_description: Static operating manual for AI Lab system, scientist, and work-unit documentation.
site_url: https://sungsoo-ahn.github.io/ai-lab/
repo_url: https://github.com/sungsoo-ahn/ai-lab

theme:
  name: material
  features:
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
  palette:
    - scheme: default
      primary: green
      accent: teal

plugins:
  - search

not_in_nav: |
  scientists/btc-autoresearch-v1/work-units/*.md
  scientists/btc-benchmark-v2/work-units/*.md

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

extra_javascript:
  - https://cdn.jsdelivr.net/npm/vega@5
  - https://cdn.jsdelivr.net/npm/vega-lite@5
  - https://cdn.jsdelivr.net/npm/vega-embed@6
  - assets/autoresearch-plots.js

extra_css:
  - assets/extra.css

nav:
  - Home: index.md
  - System Manual:
      - Overview: system/index.md
      - Architecture: system/architecture.md
      - Prompt Provenance: system/prompt-provenance.md
      - Maintenance: system/maintenance.md
      - Documentation Standards: system/documentation-standards.md
  - Scientist Manuals:
      - Overview: scientists/index.md
      - BTC AutoResearch v1:
          - Scientist Manual: scientists/btc-autoresearch-v1/index.md
      - BTC Benchmark v2:
          - Scientist Manual: scientists/btc-benchmark-v2/index.md
