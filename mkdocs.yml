site_name: AI Lab
site_description: W&B-observed local AI scientist workspace.
site_url: https://sungsoo-ahn.github.io/ai-lab/
repo_url: https://github.com/sungsoo-ahn/ai-lab

theme:
  name: material
  features:
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
  palette:
    - scheme: default
      primary: green
      accent: teal

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.superfences

extra_css:
  - assets/extra.css

nav:
  - Dashboard: index.md
  - BTC Benchmark: task/btc-benchmark.md
  - Scientist Loop: system/scientist-loop.md
  - W&B Observability: system/observability.md
  - Memory And Sources: system/memory-and-sources.md
  - Maintenance: system/maintenance.md

