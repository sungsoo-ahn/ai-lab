# Copy into an evaluation-cell or run directory when a long run needs runtime setup.
runtime_requirements:
  - profile: btc-benchmark-python
    reason: BTC Benchmark smoke and referee checks require core scientific Python imports in the checkout environment.
    allowed_installer: "bin/ai-lab runtime ensure btc-benchmark-python --repo sources/checkouts/btc_benchmark"
    required_brew_packages: []
    common_python_overlays: []
    verification:
      - "uv run python -c 'import numpy, pandas, scipy; print(\"ok\")'"
    approval_scope: overnight_or_long_running_cell_run_only
