schema_version: ai_lab_cell_run_v1
cell_id: <cell_id>
task_id: <task_id>
scheme_id: <scheme_id>
profile_id: <profile_id>
description: <What this fixed evaluation-cell loop does>
loop:
  mode: continuous
  sleep_seconds: 60
  max_cycles: 3
  max_wall_minutes: 720
  stop_file: STOP
  stop_on_no_artifact_change: false
source_gates:
  - source_id: <source_id>
    head_policy: require_registered_ref
    tracked_clean: true
    allow_untracked:
      - results/
      - results*/
commands:
  preflight:
    - id: source_status
      builtin: source_status
      args:
        - <source_id>
      timeout_seconds: 60
  cycle:
    - id: example
      cwd: /Users/sungs/ai-lab/sources/checkouts/<repo>
      argv:
        - uv
        - run
        - python
        - -m
        - scripts.example
      timeout_seconds: 3600
      env: {}
      artifacts:
        - results/example/**
  synthesis:
    - id: codex_synthesis
      builtin: synthesize
      timeout_seconds: 3600
