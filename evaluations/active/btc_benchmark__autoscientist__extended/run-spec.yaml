schema_version: ai_lab_cell_run_v1
cell_id: btc_benchmark__autoscientist__extended
task_id: btc_benchmark
scheme_id: autoscientist
profile_id: btc_benchmark_autoscientist_3h
description: Three-hour AutoScientist extended loop for BTC Benchmark with fixed source, runtime, test, data, and baseline gates.
loop:
  mode: continuous
  sleep_seconds: 0
  max_cycles: 1
  max_wall_minutes: 180
  stop_file: STOP
  stop_on_no_artifact_change: false
source_gates:
  - source_id: btc_benchmark
    head_policy: require_registered_ref
    tracked_clean: true
    allow_untracked:
      - uv.lock
commands:
  preflight:
    - id: source_status
      builtin: source_status
      args:
        - btc_benchmark
      timeout_seconds: 30
    - id: runtime_check
      cwd: "{root}"
      argv:
        - uv
        - run
        - python
        - bin/ai-lab
        - runtime
        - check
        - btc-benchmark-python
        - --repo
        - sources/checkouts/btc_benchmark
      timeout_seconds: 300
    - id: referee_contract_tests
      cwd: "{root}/sources/checkouts/btc_benchmark"
      argv:
        - uv
        - run
        - python
        - -m
        - pytest
        - tests/test_metrics.py
        - tests/test_benchmark_contract.py
        - -q
      timeout_seconds: 600
    - id: benchmark_readiness
      cwd: "{root}/sources/checkouts/btc_benchmark"
      argv:
        - uv
        - run
        - python
        - "{root}/bin/btc-benchmark-readiness"
        - --repo
        - "."
        - --run-dir
        - "{run_dir}"
      timeout_seconds: 600
      artifacts:
        - "{run_dir}/preflight_baseline_report.json"
        - "{run_dir}/preflight_leaderboard.jsonl"
  cycle: []
  synthesis:
    - id: codex_synthesis
      builtin: synthesize
      timeout_seconds: 10800
